# Локальна розробка: піднімає лише PostgreSQL.
# Backend і frontend зручніше запускати через npm (швидке гаряче перезавантаження).
#
#   docker compose up -d        # запустити базу
#   docker compose down         # зупинити
#   docker compose down -v      # зупинити + видалити дані
#
version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: itblog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: itblog
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d itblog']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
